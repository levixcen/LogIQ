<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIQ | AI Forensics</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1d23;
            color: #B5D4F4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar with Refined Logo */
        .navbar {
            padding: 0.8rem 2rem;
            border-bottom: 1px solid #378ADD;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #121417;
            z-index: 10;
        }

        .logo {
            font-family: 'Public Sans', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.02em;
            color: #FFFFFF;
            display: flex;
            align-items: center;
        }

        .logo .light { font-weight: 100; color: #85B7EB; }
        .logo .bold { font-weight: 400; color: #FFFFFF; margin-left: 1px; }

        .tagline {
            font-size: 10px;
            color: #378ADD;
            letter-spacing: 0.15em;
            font-weight: 600;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 85%;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .system-msg {
            background: #121417;
            border: 1px solid #378ADD;
            align-self: flex-start;
        }

        .user-msg {
            background: #185FA5;
            color: #FFFFFF;
            align-self: flex-end;
            border: 1px solid #85B7EB;
        }

        .report-msg {
            background: #121417;
            border: 1px solid #FFFFFF;
            align-self: flex-start;
            font-family: 'Courier New', monospace;
            width: 100%;
        }

        .report-header {
            color: #378ADD;
            font-weight: 700;
            margin-top: 1rem;
            border-bottom: 1px solid #185FA5;
            display: block;
            font-size: 12px;
        }

        /* Bottom Area */
        .input-area {
            padding: 1rem 2rem 2.5rem;
            background: linear-gradient(transparent, #1a1d23 40%);
        }

        .file-support-legend {
            max-width: 800px;
            margin: 0 auto 10px;
            font-size: 11px;
            color: #378ADD;
            display: flex;
            gap: 15px;
            justify-content: center;
            font-weight: 600;
        }

        .format-tag { border: 1px solid #378ADD; padding: 2px 6px; border-radius: 4px; opacity: 0.8; }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #121417;
            border: 1px solid #FFFFFF;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-label {
            color: #85B7EB;
            cursor: pointer;
            font-size: 24px;
            padding: 0 8px;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: #B5D4F4;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: #378ADD;
            color: #121417;
            border: none;
            padding: 6px 16px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        .report-msg {
    background: #121417;
    border: 1px solid #FFFFFF;
    align-self: flex-start;
    font-family: 'Inter', sans-serif;
    width: 100%;
    max-width: 100%;
        }

        input[type="file"] { display: none; }

        .step-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #378ADD; margin-bottom: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #378ADD; }
        .done { color: #1D9E75; }
        .done .dot { background: #1D9E75; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="light">Log</span><span class="bold">IQ</span>
        </div>
        <div class="tagline">BLUE TEAM FORENSICS</div>
    </nav>

    <div class="chat-container" id="chatContainer">
        <div class="message system-msg">
            Session initialized. Upload forensic logs to reconstruct attack sequences.
        </div>
    </div>

    <div class="input-area">
        <!-- Supported Formats Indicator -->
        <div class="file-support-legend" id="supportLegend">
            <span>Supported:</span>
            <span class="format-tag">.LOG</span>
            <span class="format-tag">.TXT</span>
        </div>

        <div class="input-wrapper">
            <label class="file-label" for="logfile" id="fileIcon">+</label>
            <input type="file" id="logfile">
            <input type="text" id="userInput" placeholder="Upload a file..." readonly>
            <button class="send-btn" id="sendBtn" onclick="handleInteraction()" disabled>Analyze</button>
        </div>
    </div>

    <script>
        const logInput = document.getElementById('logfile');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const chatContainer = document.getElementById('chatContainer');
const fileIcon = document.getElementById('fileIcon');
const supportLegend = document.getElementById('supportLegend');

let analysisComplete = false;
let currentReport = '';

logInput.addEventListener('change', () => {
    if(logInput.files[0]) {
        userInput.value = logInput.files[0].name;
        sendBtn.disabled = false;
    }
});

function addMessage(content, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = content;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
}

function formatChatResponse(text) {
    if (!text) return '';
    try {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<span style="color:#FFFFFF;font-weight:600;">$1</span>')
            .replace(/`(.+?)`/g, '<code style="background:#0d0d0d;color:#85B7EB;padding:1px 6px;border-radius:4px;font-family:Courier New,monospace;font-size:12px;">$1</code>')
            .replace(/^\d+\.\s(.+)$/gm, '<div style="display:flex;gap:8px;margin-bottom:4px;"><span style="color:#378ADD;">•</span><span>$1</span></div>')
            .replace(/\n/g, '<br>');
    } catch(e) {
        return text.replace(/\n/g, '<br>');
    }
}

function formatReport(text) {
    const sections = [
        'CLASSIFICATION',
        'REPORT ID',
        'DATE',
        'ANALYST',
        'EXECUTIVE SUMMARY',
        'ATTACK TIMELINE',
        'MITRE ATT&CK MAPPING',
        'NARRATIVE',
        'RECOMMENDED NEXT STEPS',
        'ANALYST NOTES'
    ];

    let lines = text.split('\n');
    let html = '<span class="report-header" style="font-size:13px;margin-bottom:1rem;">FORENSIC REPORT</span>';
    
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;margin-bottom:1.2rem;padding-bottom:0.8rem;border-bottom:1px solid #185FA5;font-size:12px;">';
    
    let metaFields = ['CLASSIFICATION', 'REPORT ID', 'DATE', 'ANALYST'];
    let metaHtml = '';
    let bodyLines = [];
    let inMeta = true;

    lines.forEach(line => {
        const trimmed = line.trim();
        if(!trimmed) return;

        const isMetaField = metaFields.some(f => trimmed.startsWith(f + ':'));
        if(isMetaField && inMeta) {
            const colon = trimmed.indexOf(':');
            const key = trimmed.substring(0, colon).trim();
            const value = trimmed.substring(colon + 1).trim();
            metaHtml += `<div><span style="color:#378ADD;font-size:10px;letter-spacing:0.1em;">${key}</span><div style="color:#FFFFFF;margin-top:2px;">${value}</div></div>`;
        } else {
            inMeta = false;
            bodyLines.push(trimmed);
        }
    });

    html += metaHtml + '</div>';

    let bodyText = bodyLines.join('\n');

    sections.slice(4).forEach(section => {
        const regex = new RegExp(`(${section})`, 'g');
        bodyText = bodyText.replace(regex, `|||SECTION|||${section}`);
    });

    const parts = bodyText.split('|||SECTION|||');
    parts.forEach(part => {
        if(!part.trim()) return;

        const isSection = sections.slice(4).some(s => part.startsWith(s));
        if(isSection) {
            const firstNewline = part.indexOf('\n');
            const header = firstNewline > -1 ? part.substring(0, firstNewline).trim() : part.trim();
            const content = firstNewline > -1 ? part.substring(firstNewline).trim() : '';

            html += `<div style="margin-bottom:1.2rem;">`;
            html += `<div style="color:#378ADD;font-size:10px;font-weight:700;letter-spacing:0.12em;border-bottom:1px solid #185FA5;padding-bottom:4px;margin-bottom:8px;">${header}</div>`;

            if(content) {
                const contentLines = content.split('\n').filter(l => l.trim());
                contentLines.forEach(l => {
                    const trimmed = l.trim();
                    if(trimmed.match(/^\d+\./)) {
                        html += `<div style="display:flex;gap:8px;margin-bottom:4px;"><span style="color:#378ADD;min-width:18px;">${trimmed.match(/^\d+/)[0]}.</span><span style="color:#B5D4F4;">${trimmed.replace(/^\d+\./, '').trim()}</span></div>`;
                    } else if(trimmed.startsWith('TACTIC:') || trimmed.includes('|')) {
                        const cells = trimmed.split('|').map(c => c.trim()).filter(Boolean);
                        html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;">`;
                        cells.forEach(cell => {
                            const isId = cell.match(/^T\d{4}/);
                            html += `<span style="font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid ${isId ? '#7F77DD' : '#185FA5'};color:${isId ? '#AFA9EC' : '#85B7EB'};">${cell}</span>`;
                        });
                        html += `</div>`;
                    } else {
                        html += `<p style="color:#B5D4F4;margin-bottom:4px;line-height:1.7;">${trimmed}</p>`;
                    }
                });
            }
            html += `</div>`;
        } else if(part.trim()) {
            html += `<p style="color:#B5D4F4;margin-bottom:4px;">${part.trim()}</p>`;
        }
    });

    return html;
}

async function handleInteraction() {
    const val = userInput.value.trim();
    if(!val) return;

    if(!analysisComplete) {
        runForensicAnalysis();
    } else {
        userInput.value = "";
        addMessage(val, 'user-msg');
        
        const thinking = addMessage('Analyzing...', 'system-msg');
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: val,
                    report_context: currentReport
                })
            });
            
            const data = await response.json();
            thinking.remove();
            
            if(data.error) {
                addMessage('Error: ' + data.error, 'system-msg');
            } else {
                try {
                    addMessage(formatChatResponse(data.response), 'system-msg');
                } catch(e) {
                    addMessage(data.response, 'system-msg');
                }
            }
        } catch(err) {
            thinking.remove();
            addMessage('Something went wrong. Please try again.', 'system-msg');
        }
    }
}

async function runForensicAnalysis() {
    sendBtn.disabled = true;
    addMessage(`Source file: <b>${logInput.files[0].name}</b>`, 'user-msg');

    addMessage(`
        <div class="step-item" id="s1"><div class="dot"></div> Normalizing log data...</div>
        <div class="step-item" id="s2"><div class="dot"></div> Heuristic timeline analysis...</div>
        <div class="step-item" id="s3"><div class="dot"></div> Finalizing MITRE mapping...</div>
    `, 'system-msg');

    const formData = new FormData();
    formData.append('logfile', logInput.files[0]);

    await new Promise(r => setTimeout(r, 800));
    document.getElementById('s1').classList.add('done');
    await new Promise(r => setTimeout(r, 800));
    document.getElementById('s2').classList.add('done');

    try {
        const response = await fetch('/analyze', {
            method: 'POST',
            body: formData
        });

        document.getElementById('s3').classList.add('done');
        const data = await response.json();

        if(data.error) {
            addMessage('Error: ' + data.error, 'system-msg');
            sendBtn.disabled = false;
            return;
        }

        currentReport = data.report;
        addMessage(formatReport(data.report), 'report-msg');

    } catch(err) {
        addMessage('Something went wrong. Please try again.', 'system-msg');
        sendBtn.disabled = false;
        return;
    }

    analysisComplete = true;
    userInput.placeholder = "Ask about this incident...";
    userInput.readOnly = false;
    userInput.value = "";
    sendBtn.innerText = "Send";
    sendBtn.disabled = false;
    fileIcon.style.opacity = "0.2";
    fileIcon.style.pointerEvents = "none";
    supportLegend.style.display = "none";
}

userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInteraction(); });
    </script>
</body>
</html>
